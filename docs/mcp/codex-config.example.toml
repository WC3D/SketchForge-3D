# Copy this server block into your Codex config.toml and replace the script
# path with the absolute path to your SketchForge checkout.
#
# Windows paths can use forward slashes:
# C:/Users/you/Desktop/SketchForge-3D/scripts/sketchforge-mcp-server.mjs

[mcp_servers.sketchforge]
command = "node"
args = ["/absolute/path/to/SketchForge-3D/scripts/sketchforge-mcp-server.mjs"]
startup_timeout_sec = 20
