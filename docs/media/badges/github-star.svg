<svg xmlns="http://www.w3.org/2000/svg" width="128" height="20" role="img" aria-label="GitHub: Star this repo">
  <title>Star SketchForge on GitHub</title>
  <linearGradient id="badge-shadow" x2="0" y2="100%">
    <stop offset="0" stop-color="#fff" stop-opacity=".12"/>
    <stop offset="1" stop-opacity=".12"/>
  </linearGradient>
  <clipPath id="badge-shape">
    <rect width="128" height="20" rx="3"/>
  </clipPath>
  <g clip-path="url(#badge-shape)">
    <rect width="47" height="20" fill="#555"/>
    <rect x="47" width="81" height="20" fill="#181717"/>
    <rect width="128" height="20" fill="url(#badge-shadow)"/>
  </g>
  <g fill="#fff" font-family="Verdana,DejaVu Sans,sans-serif" font-size="11" text-anchor="middle">
    <text x="23.5" y="15" fill="#010101" fill-opacity=".3">GitHub</text>
    <text x="23.5" y="14">GitHub</text>
    <text x="87.5" y="15" fill="#010101" fill-opacity=".3">Star this repo</text>
    <text x="87.5" y="14">Star this repo</text>
  </g>
</svg>
