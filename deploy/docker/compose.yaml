services:
  sketchforge:
    image: sketchforge:local
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "${SKETCHFORGE_PORT:-3000}:3000"
    environment:
      SKETCHFORGE_SHARED_PROJECTS_DIR: /data/projects
    volumes:
      - "${SKETCHFORGE_SHARED_PROJECTS_VOLUME:-sketchforge-shared-projects}:/data/projects"
    restart: unless-stopped

volumes:
  sketchforge-shared-projects:
